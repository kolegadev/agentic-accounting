version: "3.9"

networks:
  accounting-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  formance_data:
  katra_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: accounting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-accounting}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-accounting}
      POSTGRES_DB: ${DB_NAME:-accounting}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    networks:
      - accounting-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-accounting}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: accounting-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - accounting-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: accounting-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - accounting-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  formance-postgres:
    image: postgres:16-alpine
    container_name: accounting-formance-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-accounting}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-accounting}
      POSTGRES_DB: formance
    volumes:
      - formance_data:/var/lib/postgresql/data
    networks:
      - accounting-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-accounting} -d formance"]
      interval: 5s
      timeout: 5s
      retries: 5

  formance-ledger:
    image: ghcr.io/formancehq/ledger:v2
    container_name: accounting-formance
    restart: unless-stopped
    environment:
      STORAGE_DRIVER: postgres
      STORAGE_POSTGRES_CONN_STRING: >
        postgresql://${DB_USER:-accounting}:${DB_PASSWORD:-accounting}
        @formance-postgres:5432/formance?sslmode=disable
    depends_on:
      formance-postgres:
        condition: service_healthy
    networks:
      - accounting-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:3068/_info"]
      interval: 10s
      timeout: 5s
      retries: 5

  accounting-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: accounting-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-accounting}:${DB_PASSWORD:-accounting}@postgres:5432/${DB_NAME:-accounting}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin}
      FORNANCE_LEDGER_URL: http://formance-ledger:3068
      KATRA_MCP_URL: http://katra-memory:3113/mcp
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./api:/app
      - ./coa_templates:/app/coa_templates
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      formance-ledger:
        condition: service_healthy
    networks:
      - accounting-net

  mcp-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: accounting-gateway
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-3200}:3200"
    environment:
      API_BASE_URL: http://accounting-api:8000
      SKILL_REGISTRY_PATH: /app/skills/registry.yaml
      MCP_TRANSPORT: sse
      MCP_PORT: 3200
    volumes:
      - ./skills:/app/skills:ro
    depends_on:
      accounting-api:
        condition: service_started
    networks:
      - accounting-net

  katra-memory:
    image: ghcr.io/kolegadev/katra-agentic-memory:latest
    container_name: accounting-katra
    restart: unless-stopped
    environment:
      DB_PATH: /data/katra.db
      MCP_PORT: 3113
      KATRA_ENABLED: "true"
      KATRA_MCP_URL: http://katra-memory:3113/mcp
    volumes:
      - katra_data:/data
    networks:
      - accounting-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:3113/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - memory

  chat-ui:
    build:
      context: ./chat-ui
      dockerfile: Dockerfile
    container_name: accounting-chat-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-3000}:3000"
    environment:
      API_BASE_URL: http://accounting-api:8000
      WS_URL: ws://accounting-api:8000/ws
    depends_on:
      accounting-api:
        condition: service_started
    networks:
      - accounting-net
    profiles:
      - ui
